# Architecture A -- SB3 default NatureCNN (Mnih et al. 2015).
# Used as the *fixed* architecture in Phase 4 (hyperparameter sweep)
# and as the *baseline* architecture in Phase 5 (architecture comparison).
name: arch_nature_cnn

policy: "CnnPolicy"

features_extractor:
  class: "NatureCNN"          # racing_agent.policies.nature_cnn.NatureCNN
  kwargs:
    features_dim: 512

# Policy / Q-function heads after the feature extractor.
net_arch:
  pi: [256, 256]
  qf: [256, 256]

# Layer schema (for the report - regenerated by utils.plotting.plot_arch_diagram):
#   Input        : (4, 84, 84)   float32 / 255.0
#   Conv(32, 8, s=4) + ReLU      -> (32, 20, 20)
#   Conv(64, 4, s=2) + ReLU      -> (64,  9,  9)
#   Conv(64, 3, s=1) + ReLU      -> (64,  7,  7)
#   Flatten                      -> (3136,)
#   Linear(3136 -> 512) + ReLU   -> (512,)        <-- features_dim
