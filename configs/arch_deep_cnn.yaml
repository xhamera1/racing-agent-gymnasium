# Architecture B -- our custom deeper CNN with BatchNorm.
# Compared against NatureCNN in Phase 5 of PLAN.md (the 6-point task).
name: arch_deep_cnn

policy: "CnnPolicy"

features_extractor:
  class: "CustomDeepCNN"      # racing_agent.policies.custom_cnn.CustomDeepCNN
  kwargs:
    features_dim: 256

# Heads are kept identical to arch_nature_cnn so the comparison is fair.
net_arch:
  pi: [256, 256]
  qf: [256, 256]

# Layer schema (regenerated by utils.plotting.plot_arch_diagram):
#   Input         : (4, 84, 84)   float32 / 255.0
#   Conv(32,  3, s=2) + BN + ReLU -> (32, 42, 42)
#   Conv(64,  3, s=2) + BN + ReLU -> (64, 21, 21)
#   Conv(128, 3, s=2) + BN + ReLU -> (128, 11, 11)
#   Conv(128, 3, s=1) + BN + ReLU -> (128, 11, 11)
#   AdaptiveAvgPool2d(1)          -> (128,  1,  1)
#   Flatten                       -> (128,)
#   Linear(128 -> 256) + ReLU     -> (256,)        <-- features_dim
