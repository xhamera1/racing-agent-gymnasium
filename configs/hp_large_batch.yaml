# Hyperparameter set #3 -- large batch + more gradient steps per env step.
# Hypothesis: bigger, less noisy updates yield smoother curves at higher
# wall-clock cost. Buffer is shrunk to keep memory in check.
name: hp_large_batch

# --- SAC core --------------------------------------------------------------
learning_rate: 3.0e-4
buffer_size: 50000            # half of baseline -- smoother but more on-policy
learning_starts: 2000
batch_size: 512               # 2x baseline
tau: 0.005
gamma: 0.99
train_freq: 4                 # collect 4 env steps before updating
gradient_steps: 4             # then do 4 gradient updates
ent_coef: "auto"
target_update_interval: 1
use_sde: false

# --- Environment / wrappers (identical to baseline) -----------------------
env:
  n_envs: 1
  grayscale: true
  resize_to: 84
  frame_stack: 4
  clip_reward: false
  continuous: true
  domain_randomize: false
