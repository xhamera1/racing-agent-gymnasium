# Hyperparameter set #1 -- baseline (SB3 SAC defaults).
# Reference point for the 4-point task in PLAN.md (Phase 4).
name: hp_baseline

# --- SAC core --------------------------------------------------------------
learning_rate: 3.0e-4
buffer_size: 100000          # 100k transitions (visual obs are heavy)
learning_starts: 1000
batch_size: 256
tau: 0.005
gamma: 0.99
train_freq: 1
gradient_steps: 1
ent_coef: "auto"
target_update_interval: 1
use_sde: false

# --- Environment / wrappers -----------------------------------------------
env:
  n_envs: 1
  grayscale: true
  resize_to: 84
  frame_stack: 4
  clip_reward: false
  continuous: true
  domain_randomize: false
